<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeSync Classroom: Monitoreo Activo</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
      :root {
        --bg-cyber: #0a0a12;
        --panel-bg: rgba(16, 16, 28, 0.75);
        --neon-green: #00ffcc;
        --neon-pink: #ff0080;
        --text-gray: #8a8a9d;
        --border-glow: rgba(0, 255, 204, 0.2);
      }

      body {
        background-color: var(--bg-cyber);
        color: #ffffff;
        font-family:
          'Segoe UI',
          -apple-system,
          BlinkMacSystemFont,
          Roboto,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 20px 20px;
      }

      .panel-central {
        border: 2px solid var(--neon-green);
        box-shadow: 0 0 25px var(--border-glow);
        background: var(--panel-bg);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        padding: 35px;
        border-radius: 14px;
        text-align: center;
        max-width: 420px;
        width: 90%;
        transition: all 0.4s ease;
      }

      h1 {
        color: var(--neon-green);
        font-size: 1.9rem;
        margin: 0 0 10px 0;
        text-transform: uppercase;
        letter-spacing: 3px;
        text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
      }

      .descripcion {
        color: var(--text-gray);
        font-size: 0.9rem;
        margin-bottom: 25px;
        line-height: 1.4;
      }

      .input-grupo {
        margin-bottom: 20px;
        text-align: left;
      }

      label {
        color: var(--text-gray);
        font-size: 0.8rem;
        display: block;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      input {
        width: 100%;
        padding: 12px;
        background: #121222;
        border: 1px solid #2e2e4a;
        border-radius: 7px;
        color: #ffffff;
        font-size: 1rem;
        box-sizing: border-box;
        transition: all 0.3s ease;
      }

      input:focus {
        outline: none;
        border-color: var(--neon-green);
        box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        background: #16162a;
      }

      button {
        width: 100%;
        padding: 14px;
        background: transparent;
        border: 2px solid var(--neon-green);
        color: var(--neon-green);
        font-size: 1rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-radius: 7px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      button:hover {
        background: var(--neon-green);
        color: var(--bg-cyber);
        box-shadow: 0 0 20px var(--neon-green);
      }

      .estado-contenedor {
        margin-top: 15px;
        padding: 15px;
        background: rgba(255, 0, 128, 0.05);
        border: 1px dashed var(--neon-pink);
        border-radius: 7px;
      }

      .badge-activo {
        color: var(--neon-pink);
        font-weight: bold;
        letter-spacing: 1px;
        animation: parpadeoLatente 1.5s infinite;
      }

      @keyframes parpadeoLatente {
        0%,
        100% {
          opacity: 0.6;
          text-shadow: 0 0 2px var(--neon-pink);
        }
        50% {
          opacity: 1;
          text-shadow: 0 0 10px var(--neon-pink);
        }
      }

      .oculto {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="panel-central">
      <h1>CodeSync Web</h1>
      <div class="descripcion">Enlace de monitoreo de pantalla para laboratorios tecnicos y evaluaciones en vivo.</div>

      <div id="form-registro">
        <div class="input-grupo">
          <label for="room-id">Codigo de la Sala</label>
          <input type="text" id="room-id" placeholder="Ej: LAB-404" />
        </div>
        <div class="input-grupo">
          <label for="student-name">Tu Nombre Completo</label>
          <input type="text" id="student-name" placeholder="Mismo nombre usado en VS Code" />
        </div>
        <button id="btn-conectar" onclick="iniciarMonitoreoWeb()">Enlazar Pantalla</button>
      </div>

      <div id="panel-estado" class="oculto">
        <div class="estado-contenedor">
          <span id="txt-status" class="badge-activo">MONITOREO ACTIVO</span>
        </div>
        <p style="font-size: 0.85rem; color: var(--text-gray); margin-top: 20px; line-height: 1.5">
          Enlace exitoso. Ya puedes minimizar esta pestaña y concentrarte en el desarrollo dentro de VS Code.<br />
          <strong style="color: #ffffff">No cierres ni detengas esta ventana.</strong>
        </p>
      </div>
    </div>

    <script>
      let socket = null;
      let screenStream = null;

      const canvasMemoria = document.createElement('canvas');
      const ctxMemoria = canvasMemoria.getContext('2d');

      async function iniciarMonitoreoWeb() {
        const roomId = document.getElementById('room-id').value.trim();
        const name = document.getElementById('student-name').value.trim();

        if (!roomId || !name) {
          alert('Error: Por favor, ingresa el codigo de la sala y tu nombre completo.');
          return;
        }

        try {
          screenStream = await navigator.mediaDevices.getDisplayMedia({
            video: { displaySurface: 'monitor', logicalSurface: true },
            audio: false,
            selfBrowserSurface: 'exclude',
            surfaceSwitching: 'exclude',
          });

          if (!screenStream) return;

          const videoTrack = screenStream.getVideoTracks()[0];
          const settings = videoTrack.getSettings();

          if (settings.displaySurface !== 'monitor') {
            videoTrack.stop();
            alert('Error: Es obligatorio compartir la PANTALLA COMPLETA del monitor.');
            return;
          }

          socket = io('http://localhost:3000/code-sync', {
            transports: ['websocket'],
          });

          socket.on('connect', () => {
            socket.emit('join-room', { roomId, name, role: 'student-web' });
          });

          socket.on('join-success', () => {
            document.getElementById('form-registro').classList.add('oculto');
            document.getElementById('panel-estado').classList.remove('oculto');
            document.querySelector('.panel-central').style.borderColor = 'var(--neon-pink)';
            document.querySelector('.panel-central').style.boxShadow = '0 0 25px rgba(255, 0, 128, 0.15)';
          });

          socket.on('force-close-web', () => {
            if (videoTrack) {
              videoTrack.stop();
            }
            if (socket) {
              socket.disconnect();
            }
            restaurarFormularioRegistro();
            alert('Aviso: Se ha cerrado la sesion web de CodeSync debido a la desconexion de tu editor VS Code.');
          });

          socket.on('join-rejected', (reason) => {
            videoTrack.stop();
            if (socket) {
              socket.disconnect();
            }
            alert('Error de vinculacion: ' + reason);
            restaurarFormularioRegistro();
          });

          socket.on('trigger-screenshot', async (data) => {
            try {
              const currentTrack = screenStream.getVideoTracks()[0];
              if (currentTrack.readyState === 'ended') {
                socket.emit('desktop-screenshot-response', {
                  teacherId: data.teacherId,
                  image: null,
                });
                return;
              }

              const imageCapture = new ImageCapture(currentTrack);
              const bitmap = await imageCapture.grabFrame();

              canvasMemoria.width = bitmap.width;
              canvasMemoria.height = bitmap.height;

              ctxMemoria.clearRect(0, 0, bitmap.width, bitmap.height);
              ctxMemoria.drawImage(bitmap, 0, 0, bitmap.width, bitmap.height);
              bitmap.close();

              canvasMemoria.toBlob(
                (blob) => {
                  if (!blob) return;
                  socket.emit('desktop-screenshot-response', {
                    teacherId: data.teacherId,
                    image: blob,
                  });
                },
                'image/jpeg',
                0.4,
              );
            } catch (err) {
              console.error('Fallo al procesar frame binario:', err);
            }
          });

          videoTrack.onended = () => {
            restaurarFormularioRegistro();
            if (socket) {
              socket.disconnect();
            }
            alert('Alerta: Has desactivado el monitoreo de pantalla.');
          };
        } catch (err) {
          console.error('Acceso multimedia rechazado:', err);
          alert('Error: No se pudieron otorgar los permisos multimedia.');
        }
      }

      function restaurarFormularioRegistro() {
        document.getElementById('form-registro').classList.remove('oculto');
        document.getElementById('panel-estado').classList.add('oculto');
        document.querySelector('.panel-central').style.borderColor = 'var(--neon-green)';
        document.querySelector('.panel-central').style.boxShadow = '0 0 25px var(--border-glow)';
      }
    </script>
  </body>
</html>
